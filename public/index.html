<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            width: 800px;
            height: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        /* Lado Esquerdo - Azul */
        .left-side {
            flex: 1;
            background-color: #4b19e6; /* Cor aproximada da imagem */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
        }

        .left-side h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn-login-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 35px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-login-outline:hover {
            background: white;
            color: #4b19e6;
        }

        /* Lado Direito - Cinza/Branco */
        .right-side {
            flex: 1.2;
            background-color: #e9e9e9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .right-side h2 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 30px;
        }

        .input-group {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 3px solid #ccc6f2; /* Sombra roxa sutil da imagem */
            border-radius: 5px;
            outline: none;
        }

        .btn-register {
            margin-top: 40px;
            background-color: white;
            color: #333;
            border: 1px solid #333;
            padding: 12px 60px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .btn-register:hover {
            background-color: #333;
            color: white;
        }

        /* Responsividade básica */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                width: 90%;
                height: auto;
            }
            .left-side, .right-side {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-side">
            <h2>Faça seu Login</h2>
            <button class="btn-login-outline">
                <span style="font-size: 1.2rem;">👤</span> Login
            </button>
        </div>

        <div class="right-side">
            <h2>Cadastro</h2>
            <div class="input-group">
                <input type="text" placeholder="Nome">
                <input type="email" placeholder="E-mail">
                <input type="password" placeholder="Senha">
            </div>
            <button class="btn-register">Registrar</button>
        </div>
    </div>

</body>
</html>
