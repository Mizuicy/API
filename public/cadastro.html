<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS - Cadastro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            width: 900px;
            min-height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Lado Esquerdo - Azul com Gradiente */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #4b19e6, #6a2ee0);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .left-side h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        .left-side p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 12px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: white;
            color: #4b19e6;
        }

        /* Lado Direito - Cinza/Branco */
        .right-side {
            flex: 1.3;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 40px;
        }

        .right-side h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 2px solid #ddd;
            background: transparent;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-bottom-color: #4b19e6;
        }

        .password-requirements {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            color: #666;
        }

        .requirement.met {
            color: #28a745;
        }

        .requirement-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            text-align: center;
        }

        .terms-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .terms-checkbox input[type="checkbox"] {
            width: auto;
            border-bottom: none !important;
            cursor: pointer;
        }

        .terms-checkbox label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background-color: #4b19e6;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover:not(:disabled) {
            background-color: #3a0fb6;
        }

        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #4b19e6;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                width: 95%;
                min-height: auto;
            }

            .left-side, .right-side {
                padding: 30px 20px;
            }

            .left-side h1 {
                font-size: 2rem;
            }

            .right-side h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Lado Esquerdo -->
        <div class="left-side">
            <h1>📝 KAIROS</h1>
            <h1>Gerenciador de Biblioteca</h1>
            <p>Crie sua conta para começar</p>
            <button class="btn-outline" onclick="location.href='login.html'">← Fazer Login</button>
        </div>

        <!-- Lado Direito -->
        <div class="right-side">
            <h2>Criar Conta — KAIROS</h2>
            <div id="alertContainer"></div>
            
            <form id="cadastroForm">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" required>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="form-group">
                    <label for="dataNascimento">Data de Nascimento</label>
                    <input type="date" id="dataNascimento" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required>
                </div>

                <div class="password-requirements">
                    <div class="requirement" id="req-length">
                        <span class="requirement-icon">○</span> Mínimo 8 caracteres
                    </div>
                    <div class="requirement" id="req-upper">
                        <span class="requirement-icon">○</span> Pelo menos uma letra MAIÚSCULA
                    </div>
                    <div class="requirement" id="req-lower">
                        <span class="requirement-icon">○</span> Pelo menos uma letra minúscula
                    </div>
                    <div class="requirement" id="req-number">
                        <span class="requirement-icon">○</span> Pelo menos um número
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmaSenha">Confirmar Senha</label>
                    <input type="password" id="confirmaSenha" required>
                </div>

                <div class="terms-checkbox">
                    <input type="checkbox" id="termos" required>
                    <label for="termos">Concordo com os <strong>Termos de Serviço</strong> e <strong>Política de Privacidade</strong></label>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Criar Conta</button>
            </form>

            <div class="back-link">
                Já tem conta? <a href="login.html">Faça login</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        // Validar requisitos de senha em tempo real
        document.getElementById('senha').addEventListener('input', function() {
            const senha = this.value;
            
            const requirements = {
                'req-length': senha.length >= 8,
                'req-upper': /[A-Z]/.test(senha),
                'req-lower': /[a-z]/.test(senha),
                'req-number': /[0-9]/.test(senha)
            };

            for (const [id, met] of Object.entries(requirements)) {
                const element = document.getElementById(id);
                if (met) {
                    element.classList.add('met');
                    element.querySelector('.requirement-icon').textContent = '✓';
                } else {
                    element.classList.remove('met');
                    element.querySelector('.requirement-icon').textContent = '○';
                }
            }

            // Atualizar estado do botão
            verificarFormulario();
        });

        // Validar se senhas coincidem
        document.getElementById('confirmaSenha').addEventListener('input', verificarFormulario);
        document.getElementById('termos').addEventListener('change', verificarFormulario);

        function verificarFormulario() {
            const senha = document.getElementById('senha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;
            const termos = document.getElementById('termos').checked;
            
            const senhaValida = senha.length >= 8 && /[A-Z]/.test(senha) && /[a-z]/.test(senha) && /[0-9]/.test(senha);
            const senhasIguais = senha === confirmaSenha && senha.length > 0;
            
            document.getElementById('submitBtn').disabled = !(senhaValida && senhasIguais && termos);
        }

        // Enviar cadastro
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = {
                Nome: document.getElementById('nome').value,
                Email: document.getElementById('email').value,
                Telefone: document.getElementById('telefone').value,
                CPF: document.getElementById('cpf').value,
                DataNascimento: document.getElementById('dataNascimento').value,
                Senha: document.getElementById('senha').value
            };

            try {
                const response = await fetch(`${API_URL}/usuario`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(usuario)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao criar usuário');
                }

                mostrarAlerta('Cadastro realizado com sucesso! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                mostrarAlerta(`Erro: ${error.message}`, 'error');
            }
        });

        function mostrarAlerta(mensagem, tipo) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert ${tipo}">${mensagem}</div>`;
            if (tipo === 'error') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 5000);
            }
        }
    </script>
</body>
</html>
